<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Dashboard</title>
<style>body{font-family:Arial;margin:40px;background:#f5f5f5;}table{width:100%;border-collapse:collapse;background:white;border-radius:8px;}th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center;}th{background:#333;color:white;cursor:pointer;}tr:hover{background:#f0f0f0;}.badge-img{max-width:180px;}.score{font-weight:bold;padding:6px 12px;border-radius:6px;color:white;}</style>
</head><body><h1>Dashboard des Badges</h1>
<table id="badgeTable"><thead><tr><th onclick="sortTable(0)">Badge</th><th>Image</th><th onclick="sortTable(2)">Score</th></tr></thead><tbody id="badgeBody"></tbody></table>
<script>
function colorForScore(s){if(s>=90)return"#2ecc71";if(s>=70)return"#f1c40f";return"#e74c3c";}
async function loadBadges(){const repo="arn51/nouveau_doc";const branch="gh-pages";const api=`https://api.github.com/repos/${repo}/contents/?ref=${branch}`;const r=await fetch(api);const f=await r.json();const svgs=f.filter(x=>x.name.endsWith(".svg")&&x.name.startsWith("tests_"));for(const file of svgs){const base=file.name.replace(".svg","");const json=base+".json";let score="—";try{const jr=await fetch(`https://raw.githubusercontent.com/${repo}/${branch}/${json}`);if(jr.ok){const d=await jr.json();score=d.score??"—";}}catch(e){}const row=document.createElement("tr");row.innerHTML="<td>"+base+"</td><td><img class=badge-img src="+file.download_url+"></td><td><span class=score style=background:"+colorForScore(score)+">"+score+"</span></td>";document.getElementById("badgeBody").appendChild(row);}}
function sortTable(n){const t=document.getElementById("badgeTable");let sw=true,dir="asc",c=0;while(sw){sw=false;const r=t.rows;for(let i=1;i<r.length-1;i++){let s=false;let x=r[i].getElementsByTagName("td")[n].innerText.toLowerCase();let y=r[i+1].getElementsByTagName("td")[n].innerText.toLowerCase();if(!isNaN(parseFloat(x))){x=parseFloat(x);y=parseFloat(y);}if((dir=="asc"&&x>y)||(dir=="desc"&&x<y)){s=true;break;}if(s){r[i].parentNode.insertBefore(r[i+1],r[i]);sw=true;c++;break;}}if(!sw&&c==0&&dir=="asc"){dir="desc";sw=true;}}}
loadBadges();</script></body></html>
