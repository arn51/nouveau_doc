name: Validation des documents

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # 1) Récupération du dépôt
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Ajouter bin au PATH
        run: echo "$PWD/bin" >> $GITHUB_PATH

      - name: Définir NOUVEAU_DOC_ROOT
        run: echo "NOUVEAU_DOC_ROOT=${{ github.workspace }}" >> $GITHUB_ENV

      # 2) Installation des dépendances
      - name: Installer jq
        run: sudo apt-get install -y jq

      # 3) Donner les droits d'exécution
      - name: Rendre les scripts exécutables
        run: chmod +x validate_all_multi.sh

      - name: Debug nouveau_doc
        run: |
          which nouveau_doc
          nouveau_doc --help || true
          ls -R .
          ls -R rules
          ls -R rules_engine

      # 4) Exécuter la validation complète
      - name: Exécuter validate_all_multi.sh (rapport complet)
        id: validation
        env:
          NOUVEAU_DOC_ROOT: ${{ github.workspace }}
        run: |
          ./validate_all_multi.sh --ci-report-all

      - name: Générer le badge global
        run: ./validate_all_multi.sh --ci-badge-auto

      - name: Debug badges globaux
        run: |
          echo "Contenu du dossier courant :"
          ls -l .
          echo "Recherche des badges :"
          find . -name "tests_badge*"

      - name: Générer les badges par type
        run: ./validate_all_multi.sh --ci-badges-per-type
        continue-on-error: true

      # 5) Ajouter le résumé Markdown dans l’onglet Summary
      - name: Ajouter résumé Markdown
        if: always()
        run: |
          echo "## Résultats des tests" >> $GITHUB_STEP_SUMMARY
          if [ -f report.md ]; then
            cat report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "**Aucun fichier report.md généré.**" >> $GITHUB_STEP_SUMMARY
          fi

      # 6) Upload des artefacts (rapports + badges)
      - name: Upload des rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-validation
          path: |
            report.md
            report.json
            report.junit.xml
            tests_*.svg
            tests_badge.json
            tests_badge*.json
          if-no-files-found: warn

      # 7) Échec du job si la validation échoue
      - name: Vérifier le statut final
        if: steps.validation.outcome == 'failure'
        run: exit 1

  publish-badge:
    needs: validate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Télécharger les artefacts
        uses: actions/download-artifact@v4
        with:
          name: rapports-validation

      - name: Publier le badge dans gh-pages
        run: |
          mkdir -p public
          cp tests_*.svg public/
          cp tests_*.json public/ || true

      - name: Générer la page HTML des badges
        run: |
          mkdir -p public
          echo '<!DOCTYPE html>' > public/index.html
          echo '<html lang="fr"><head><meta charset="UTF-8"><title>Dashboard</title>' >> public/index.html
          echo '<style>body{font-family:Arial;margin:40px;background:#f5f5f5;}table{width:100%;border-collapse:collapse;background:white;border-radius:8px;}th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center;}th{background:#333;color:white;cursor:pointer;}tr:hover{background:#f0f0f0;}.badge-img{max-width:180px;}.score{font-weight:bold;padding:6px 12px;border-radius:6px;color:white;}</style>' >> public/index.html
          echo '</head><body><h1>Dashboard des Badges</h1>' >> public/index.html
          echo '<table id="badgeTable"><thead><tr><th onclick="sortTable(0)">Badge</th><th>Image</th><th onclick="sortTable(2)">Score</th></tr></thead><tbody id="badgeBody"></tbody></table>' >> public/index.html
          echo '<script>' >> public/index.html
          echo 'function colorForScore(s){if(s>=90)return"#2ecc71";if(s>=70)return"#f1c40f";return"#e74c3c";}' >> public/index.html
          echo 'async function loadBadges(){const repo="arn51/nouveau_doc";const branch="gh-pages";const api=`https://api.github.com/repos/${repo}/contents/?ref=${branch}`;const r=await fetch(api);const f=await r.json();const svgs=f.filter(x=>x.name.endsWith(".svg")&&x.name.startsWith("tests_"));for(const file of svgs){const base=file.name.replace(".svg","");const json=base+".json";let score="—";try{const jr=await fetch(`https://raw.githubusercontent.com/${repo}/${branch}/${json}`);if(jr.ok){const d=await jr.json();score=d.score??"—";}}catch(e){}const row=document.createElement("tr");row.innerHTML="<td>"+base+"</td><td><img class=badge-img src="+file.download_url+"></td><td><span class=score style=background:"+colorForScore(score)+">"+score+"</span></td>";document.getElementById("badgeBody").appendChild(row);}}' >> public/index.html
          echo 'function sortTable(n){const t=document.getElementById("badgeTable");let sw=true,dir="asc",c=0;while(sw){sw=false;const r=t.rows;for(let i=1;i<r.length-1;i++){let s=false;let x=r[i].getElementsByTagName("td")[n].innerText.toLowerCase();let y=r[i+1].getElementsByTagName("td")[n].innerText.toLowerCase();if(!isNaN(parseFloat(x))){x=parseFloat(x);y=parseFloat(y);}if((dir=="asc"&&x>y)||(dir=="desc"&&x<y)){s=true;break;}if(s){r[i].parentNode.insertBefore(r[i+1],r[i]);sw=true;c++;break;}}if(!sw&&c==0&&dir=="asc"){dir="desc";sw=true;}}}' >> public/index.html
          echo 'loadBadges();</script></body></html>' >> public/index.html


      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
